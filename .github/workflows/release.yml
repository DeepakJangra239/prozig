name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-macos
            os: macos-latest
          - target: aarch64-macos
            os: macos-latest
          - target: x86_64-linux
            os: ubuntu-latest
          - target: aarch64-linux
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install SQLite3 (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite

      - name: Install SQLite3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/prozig dist/
          cd dist
          tar czf ../prozig-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz prozig

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prozig-${{ matrix.target }}
          path: prozig-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: prozig-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: prozig-*.tar.gz
          generate_release_notes: true
